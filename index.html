<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Joyus Studio builds art, companies, brands, and products. We help businesses create meaningful connections through design, strategy, and storytelling.">
  <meta property="og:title" content="Joyus Studio — Design, Storytelling, Imagination">
  <meta property="og:description" content="Joyus Studio builds art, companies, brands, and products through design, strategy, and storytelling.">
  <meta property="og:image" content="https://kh9010.github.io/joyus-website/images/logo.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://kh9010.github.io/joyus-website/">
  <meta name="twitter:card" content="summary">
  <link rel="canonical" href="https://kh9010.github.io/joyus-website/">
  <title>Joyus Studio — Design, Storytelling, Imagination</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Background illustration — hidden behind white canvas, revealed via cutout */
    .bg-illustration {
      display: none;
    }

    .splash-logo {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      opacity: 0.3;
      transition: opacity 0.4s ease;
    }

    .splash-logo img {
      height: 28px;
      width: auto;
    }

    .splash-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: 'Caveat', cursive;
      font-size: 1.5rem;
      color: #ccc;
      pointer-events: none;
      transition: opacity 0.6s ease;
      text-align: center;
      line-height: 1.4;
    }

    .splash-prompt.hidden {
      opacity: 0;
    }

    .splash-prompt.enter-prompt {
      opacity: 0;
      animation: fadeInPrompt 0.8s ease 0.3s forwards;
      color: #E91E7B;
      font-size: 1.6rem;
      cursor: default;
    }

    @keyframes fadeInPrompt {
      from { opacity: 0; transform: translate(-50%, -50%) translateY(6px); }
      to { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
    }

    /* Shape hint label positioned near the shape */
    .shape-hint {
      position: fixed;
      z-index: 10;
      font-family: 'Caveat', cursive;
      font-size: 1.3rem;
      color: #E91E7B;
      pointer-events: none;
      opacity: 0;
      animation: fadeInHint 1s ease 0.5s forwards;
      text-align: center;
      white-space: nowrap;
    }

    @keyframes fadeInHint {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 0.9; transform: translateY(0); }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      cursor: crosshair;
    }

    /* Pulse glow overlay for closed shape */
    .shape-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .shape-glow.active {
      opacity: 1;
      animation: pulseGlow 2.5s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Page fade out */
    .splash-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: opacity 0.7s ease;
    }

    .splash-wrapper.fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>
  <!-- Background illustration revealed through canvas cutout -->
  <div class="bg-illustration" id="bgIllustration"></div>

  <h1 class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Joyus Studio — Design, Storytelling, Imagination</h1>
  <div class="splash-wrapper" id="splashWrapper">
    <a href="home.html" class="splash-logo">
      <img src="images/logo.webp" alt="Joyus Studio">
    </a>

    <div class="splash-prompt" id="prompt">draw something</div>

    <canvas id="canvas"></canvas>
  </div>

  <script>
    if (sessionStorage.getItem('joyus_entered')) {
      window.location.replace('home.html');
    }

    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const promptEl = document.getElementById('prompt');
    if (isTouchDevice) promptEl.textContent = 'draw with your finger';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('splashWrapper');

    let drawing = false;
    let points = [];
    let allStrokes = [];
    let shapeClosed = false;
    let closedShape = null;
    let hasStartedDrawing = false;
    let targetPage = 'home.html';
    let lastClassification = null;

    const PINK = '#E91E7B';

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      redrawAll();
    }

    function redrawAll() {
      // Fill with white so the canvas is opaque (hides illustration behind)
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // Redraw all completed strokes
      for (const stroke of allStrokes) {
        drawStroke(stroke, false);
      }
      // Redraw current stroke
      if (points.length > 1) {
        drawStroke(points, false);
      }
      // If shape is closed, paint the illustration into the enclosed region
      if (shapeClosed && enclosedData) {
        paintIllustrationInRegion(enclosedData, 1);
      }
    }

    function drawStroke(pts, incremental) {
      if (pts.length < 2) return;
      ctx.globalCompositeOperation = 'source-over';
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(233, 30, 123, 0.6)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (incremental) {
        // Only draw the last segment
        const i = pts.length - 1;
        ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
        ctx.lineTo(pts[i].x, pts[i].y);
      } else {
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) {
          ctx.lineTo(pts[i].x, pts[i].y);
        }
      }
      ctx.stroke();
    }

    function drawFill() {
      if (!closedShape || closedShape.length < 3) return;
      const closedStroke = closedShape;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(closedStroke[0].x, closedStroke[0].y);
      for (let i = 1; i < closedStroke.length; i++) {
        ctx.lineTo(closedStroke[i].x, closedStroke[i].y);
      }
      ctx.closePath();

      // Gradient fill
      const bounds = getBounds(closedStroke);
      const gradient = ctx.createLinearGradient(bounds.minX, bounds.minY, bounds.maxX, bounds.maxY);
      gradient.addColorStop(0, 'rgba(233, 30, 123, 0.15)');
      gradient.addColorStop(0.5, 'rgba(233, 30, 123, 0.25)');
      gradient.addColorStop(1, 'rgba(233, 30, 123, 0.12)');
      ctx.fillStyle = gradient;
      ctx.fill();

      // Redraw the stroke on top, slightly stronger
      ctx.strokeStyle = 'rgba(233, 30, 123, 0.8)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Soft glow around shape
      ctx.shadowColor = 'rgba(233, 30, 123, 0.3)';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = 'rgba(233, 30, 123, 0.3)';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.restore();
    }

    function getBounds(pts) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of pts) {
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }
      return { minX, minY, maxX, maxY };
    }

    function getPos(e) {
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function dist(a, b) {
      return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
    }

    function isInsideShape(point, polygon) {
      // Ray-casting algorithm
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const xi = polygon[i].x, yi = polygon[i].y;
        const xj = polygon[j].x, yj = polygon[j].y;
        const intersect = ((yi > point.y) !== (yj > point.y))
          && (point.x < (xj - xi) * (point.y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function startDraw(e) {
      if (shapeClosed) return;
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      points = [pos];

      if (!hasStartedDrawing) {
        hasStartedDrawing = true;
        promptEl.classList.add('hidden');
      }
    }

    function moveDraw(e) {
      if (!drawing || shapeClosed) return;
      e.preventDefault();
      const pos = getPos(e);
      points.push(pos);
      drawStroke(points, true);
    }

    // Detect enclosed regions using a small offscreen canvas + flood fill
    function findEnclosedRegion() {
      var scale = 0.15; // work at 15% resolution for speed
      var w = Math.ceil(window.innerWidth * scale);
      var h = Math.ceil(window.innerHeight * scale);
      var off = document.createElement('canvas');
      off.width = w;
      off.height = h;
      var oc = off.getContext('2d');

      // Draw all strokes onto the small canvas
      oc.strokeStyle = '#000';
      oc.lineWidth = Math.max(2, 3 * scale);
      oc.lineCap = 'round';
      oc.lineJoin = 'round';
      for (var s = 0; s < allStrokes.length; s++) {
        var stroke = allStrokes[s];
        if (stroke.length < 2) continue;
        oc.beginPath();
        oc.moveTo(stroke[0].x * scale, stroke[0].y * scale);
        for (var i = 1; i < stroke.length; i++) {
          oc.lineTo(stroke[i].x * scale, stroke[i].y * scale);
        }
        oc.stroke();
      }

      // Get pixel data
      var imgData = oc.getImageData(0, 0, w, h);
      var data = imgData.data;
      var visited = new Uint8Array(w * h);

      // Mark stroke pixels as visited (they're walls)
      for (var i = 0; i < w * h; i++) {
        if (data[i * 4 + 3] > 30) visited[i] = 1; // has alpha = stroke pixel
      }

      // Flood fill from all edges to find "outside" pixels
      var queue = [];
      for (var x = 0; x < w; x++) {
        if (!visited[x]) queue.push(x); // top edge
        var bot = (h - 1) * w + x;
        if (!visited[bot]) queue.push(bot);
      }
      for (var y = 0; y < h; y++) {
        var left = y * w;
        if (!visited[left]) queue.push(left);
        var right = y * w + w - 1;
        if (!visited[right]) queue.push(right);
      }

      // BFS flood fill
      for (var qi = 0; qi < queue.length; qi++) {
        var idx = queue[qi];
        if (visited[idx]) continue;
        visited[idx] = 2; // 2 = outside
        var px = idx % w, py = Math.floor(idx / w);
        if (px > 0 && !visited[idx - 1]) queue.push(idx - 1);
        if (px < w - 1 && !visited[idx + 1]) queue.push(idx + 1);
        if (py > 0 && !visited[idx - w]) queue.push(idx - w);
        if (py < h - 1 && !visited[idx + w]) queue.push(idx + w);
      }

      // Any pixel that's not visited (not wall, not outside) is inside an enclosed region
      var insidePixels = [];
      for (var i = 0; i < w * h; i++) {
        if (visited[i] === 0) {
          insidePixels.push({
            x: (i % w) / scale,
            y: Math.floor(i / w) / scale
          });
        }
      }

      if (insidePixels.length < 20) return null; // too small, probably noise

      // Build a convex-ish outline from the inside pixels for fill rendering
      // Just return the bounding info and use the offscreen data for the fill
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (var i = 0; i < insidePixels.length; i++) {
        var p = insidePixels[i];
        if (p.x < minX) minX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.x > maxX) maxX = p.x;
        if (p.y > maxY) maxY = p.y;
      }

      return { pixels: insidePixels, bounds: { minX: minX, minY: minY, maxX: maxX, maxY: maxY }, visited: visited, scale: scale, w: w, h: h };
    }

    var enclosedData = null;

    // Preload the illustration image
    var illustrationImg = new Image();
    illustrationImg.src = 'images/illustration-hero.png';

    // Paint the illustration into the enclosed region on the canvas
    function paintIllustrationInRegion(region, alpha) {
      if (!illustrationImg.complete) return;
      var step = 1 / region.scale;
      var vw = window.innerWidth;
      var vh = window.innerHeight;

      // Draw the illustration to a temp canvas, scaled to cover viewport
      var tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = vw;
      tmpCanvas.height = vh;
      var tmpCtx = tmpCanvas.getContext('2d');

      // Contain logic: fit entire image centered in viewport
      var imgW = illustrationImg.naturalWidth;
      var imgH = illustrationImg.naturalHeight;
      var imgScale = Math.min(vw * 0.7 / imgW, vh * 0.7 / imgH);
      var drawW = imgW * imgScale;
      var drawH = imgH * imgScale;
      var offsetX = (vw - drawW) / 2;
      var offsetY = (vh - drawH) / 2;
      tmpCtx.fillStyle = '#FFFFFF';
      tmpCtx.fillRect(0, 0, vw, vh);
      tmpCtx.drawImage(illustrationImg, offsetX, offsetY, drawW, drawH);

      // Now paint only the enclosed pixels from the temp canvas onto the main canvas
      ctx.save();
      ctx.globalAlpha = alpha || 1;
      for (var y = 0; y < region.h; y++) {
        for (var x = 0; x < region.w; x++) {
          if (region.visited[y * region.w + x] === 0) {
            var sx = Math.floor(x / region.scale);
            var sy = Math.floor(y / region.scale);
            ctx.drawImage(tmpCanvas, sx, sy, step, step, sx, sy, step, step);
          }
        }
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ── Polygon detection ──
    // Extract boundary points from the enclosed region, then count corners
    function getBoundaryPoints(region) {
      var pts = [];
      var s = region.scale;
      for (var i = 0; i < region.pixels.length; i++) {
        var px = Math.floor(region.pixels[i].x * s);
        var py = Math.floor(region.pixels[i].y * s);
        var idx = py * region.w + px;
        if (px <= 0 || px >= region.w - 1 || py <= 0 || py >= region.h - 1 ||
            region.visited[idx - 1] !== 0 || region.visited[idx + 1] !== 0 ||
            region.visited[idx - region.w] !== 0 || region.visited[idx + region.w] !== 0) {
          pts.push({ x: region.pixels[i].x, y: region.pixels[i].y });
        }
      }
      return pts;
    }

    // Simple convex hull (Graham scan)
    function convexHull(points) {
      if (points.length < 3) return points;
      // Find lowest point
      var start = 0;
      for (var i = 1; i < points.length; i++) {
        if (points[i].y > points[start].y || (points[i].y === points[start].y && points[i].x < points[start].x))
          start = i;
      }
      var pivot = points[start];
      var sorted = points.slice().sort(function (a, b) {
        var aa = Math.atan2(a.y - pivot.y, a.x - pivot.x);
        var ba = Math.atan2(b.y - pivot.y, b.x - pivot.x);
        return aa - ba || dist(pivot, a) - dist(pivot, b);
      });
      var hull = [sorted[0], sorted[1]];
      for (var i = 2; i < sorted.length; i++) {
        while (hull.length > 1 && cross(hull[hull.length - 2], hull[hull.length - 1], sorted[i]) <= 0)
          hull.pop();
        hull.push(sorted[i]);
      }
      return hull;
    }

    function cross(o, a, b) {
      return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
    }

    // Count significant corners on a polygon using angle-based detection
    function countCorners(hull, tolerance) {
      if (hull.length < 3) return hull.length;
      tolerance = tolerance || 0.4; // radians — ~23 degrees
      var corners = 0;
      var n = hull.length;
      for (var i = 0; i < n; i++) {
        var prev = hull[(i - 1 + n) % n];
        var curr = hull[i];
        var next = hull[(i + 1) % n];
        var a1 = Math.atan2(curr.y - prev.y, curr.x - prev.x);
        var a2 = Math.atan2(next.y - curr.y, next.x - curr.x);
        var diff = Math.abs(a2 - a1);
        if (diff > Math.PI) diff = 2 * Math.PI - diff;
        if (diff > tolerance) corners++;
      }
      return corners;
    }

    // Simplify hull using Ramer-Douglas-Peucker
    function simplifyHull(pts, epsilon) {
      if (pts.length < 3) return pts;
      var maxDist = 0, maxIdx = 0;
      var start = pts[0], end = pts[pts.length - 1];
      for (var i = 1; i < pts.length - 1; i++) {
        var d = pointLineDistance(pts[i], start, end);
        if (d > maxDist) { maxDist = d; maxIdx = i; }
      }
      if (maxDist > epsilon) {
        var left = simplifyHull(pts.slice(0, maxIdx + 1), epsilon);
        var right = simplifyHull(pts.slice(maxIdx), epsilon);
        return left.slice(0, -1).concat(right);
      }
      return [start, end];
    }

    function pointLineDistance(p, a, b) {
      var dx = b.x - a.x, dy = b.y - a.y;
      var len = Math.sqrt(dx * dx + dy * dy);
      if (len === 0) return dist(p, a);
      return Math.abs(dx * (a.y - p.y) - dy * (a.x - p.x)) / len;
    }

    // Shape destinations — simple and reliable
    var SHAPES = {
      circle:    { page: 'about.html',        hint: 'no corners to hide behind' },
      triangle:  { page: 'comics/gossip.html', hint: 'three people in every piece of gossip' },
      square:    { page: 'podcast/504-creating-comics-together-with-kahran-and-divya.html', hint: 'four panels on a page' },
      rectangle: { page: 'home.html',          hint: 'step inside' },
    };

    // ══════════════════════════════════════════════════════════════════
    // ── SHAPE CLASSIFIER v3: Multi-signal stroke geometry analysis ──
    // ══════════════════════════════════════════════════════════════════
    //
    // Five independent signals, each measuring a different geometric
    // property. Weighted vote picks the winner. Designed for freehand
    // mouse/touch input at ~60fps.
    //
    //   Signal 1 — Corner count (RDP at 3 epsilon levels, take median)
    //   Signal 2 — Curvature profile (smooth vs sharp direction changes)
    //   Signal 3 — Isoperimetric quotient (4*PI*area / perimeter^2)
    //   Signal 4 — Bounding-box fill ratio (pixel area / bbox area)
    //   Signal 5 — Convex hull vertex count + hull fit
    //
    // Special handling:
    //   - Multi-stroke drawings (3 strokes = triangle, 4 = rectangle)
    //   - Rounded rectangle vs circle disambiguation
    //   - Square easter egg (rectangle with aspect ratio near 1:1)
    //
    // Thresholds tuned for hand-drawn shapes on canvas/touchscreen.
    // ══════════════════════════════════════════════════════════════════

    // ── Helper: merge all strokes into one ordered point array ──
    function flattenStrokes() {
      var all = [];
      for (var s = 0; s < allStrokes.length; s++) {
        for (var i = 0; i < allStrokes[s].length; i++) all.push(allStrokes[s][i]);
      }
      return all;
    }

    // ── Helper: resample point array to N evenly-spaced points ──
    // This normalizes for drawing speed — fast strokes produce fewer
    // points, slow strokes produce more. After resampling, every
    // algorithm sees the same density.
    function resamplePoints(pts, n) {
      if (pts.length < 2) return pts.slice();
      // Compute total arc length
      var totalLen = 0;
      for (var i = 1; i < pts.length; i++) totalLen += dist(pts[i - 1], pts[i]);
      if (totalLen < 1) return pts.slice();

      var interval = totalLen / (n - 1);
      var resampled = [{ x: pts[0].x, y: pts[0].y }];
      var carry = 0;
      var src = 1;
      while (resampled.length < n - 1 && src < pts.length) {
        var d = dist(pts[src - 1], pts[src]);
        if (d < 0.001) { src++; continue; }
        if (carry + d >= interval) {
          var overshoot = interval - carry;
          var ratio = overshoot / d;
          var nx = pts[src - 1].x + ratio * (pts[src].x - pts[src - 1].x);
          var ny = pts[src - 1].y + ratio * (pts[src].y - pts[src - 1].y);
          resampled.push({ x: nx, y: ny });
          // Insert interpolated point so remaining segment is handled
          pts = pts.slice(); // avoid mutating original
          pts.splice(src, 0, { x: nx, y: ny });
          carry = 0;
        } else {
          carry += d;
          src++;
        }
      }
      resampled.push({ x: pts[pts.length - 1].x, y: pts[pts.length - 1].y });
      // Trim to exactly n (resampling can overshoot by 1 due to float issues)
      return resampled.slice(0, n);
    }

    // ── Helper: polygon area via shoelace formula ──
    function polygonArea(pts) {
      var a = 0;
      for (var i = 0, j = pts.length - 1; i < pts.length; j = i++) {
        a += pts[j].x * pts[i].y - pts[i].x * pts[j].y;
      }
      return Math.abs(a) / 2;
    }

    // ── Helper: perimeter of closed polygon ──
    function polyPerimeter(pts) {
      var p = 0;
      for (var i = 1; i < pts.length; i++) p += dist(pts[i - 1], pts[i]);
      p += dist(pts[pts.length - 1], pts[0]);
      return p;
    }

    // ══════════════════════════════════════════════════════
    // SIGNAL 1: Corner count via RDP at multiple epsilons
    // ══════════════════════════════════════════════════════
    // Why multiple epsilons? A single epsilon can over-simplify or
    // under-simplify depending on shape size and stroke noise.
    // Taking the median of 3 levels makes this robust to both.
    //
    // Corner = any vertex in the simplified path where the direction
    // changes by more than 30 degrees (0.52 rad).
    //
    // Expected values:
    //   Circle:    0-2 corners (smooth curve, no sharp turns)
    //   Triangle:  3 corners  (three sharp turns ~60-120 deg each)
    //   Rectangle: 4 corners  (four ~90 deg turns)
    //   Noisy/wobbly: 6+ (many small wiggles survive simplification)

    function countCornersAtEpsilon(pts, epsilon) {
      var simplified = simplifyHull(pts, epsilon);
      var corners = 0;
      var n = simplified.length;
      for (var i = 1; i < n - 1; i++) {
        var prev = simplified[i - 1];
        var curr = simplified[i];
        var next = simplified[i + 1];
        var a1 = Math.atan2(curr.y - prev.y, curr.x - prev.x);
        var a2 = Math.atan2(next.y - curr.y, next.x - curr.x);
        var diff = Math.abs(a2 - a1);
        if (diff > Math.PI) diff = 2 * Math.PI - diff;
        if (diff > 0.52) corners++; // 30 degrees
      }
      return corners;
    }

    function detectCorners() {
      var raw = flattenStrokes();
      if (raw.length < 10) return { corners: 0 };

      var pts = resamplePoints(raw, 128);

      var totalLen = 0;
      for (var i = 1; i < pts.length; i++) totalLen += dist(pts[i - 1], pts[i]);

      // Three epsilon levels: 3%, 5%, 7% of total path length
      var counts = [
        countCornersAtEpsilon(pts, totalLen * 0.03),
        countCornersAtEpsilon(pts, totalLen * 0.05),
        countCornersAtEpsilon(pts, totalLen * 0.07)
      ];
      counts.sort(function(a, b) { return a - b; });
      return { corners: counts[1] }; // median
    }

    // ══════════════════════════════════════════════════════
    // SIGNAL 2: Curvature profile
    // ══════════════════════════════════════════════════════
    // At each resampled point, measure the direction change from
    // the previous segment. Classify each step as "smooth" or "sharp".
    //
    // Circles have nearly ALL smooth steps (gentle, consistent curvature).
    // Polygons have long runs of near-zero curvature (straight sides)
    // punctuated by a few very sharp spikes (corners).
    //
    // smoothRatio = fraction of steps that are smooth (< 20 deg change).
    //   Circle:    0.80 - 1.00
    //   Triangle:  0.40 - 0.65
    //   Rectangle: 0.50 - 0.70
    //
    // sharpCount = number of steps exceeding the sharp threshold.
    //   Circle: 0-5, Triangle: 5-15, Rectangle: 6-18

    function curvatureProfile() {
      var raw = flattenStrokes();
      if (raw.length < 20) return { smoothRatio: 0.5, sharpCount: 0 };

      var pts = resamplePoints(raw, 100);
      var sharpThreshold = 0.35; // radians, ~20 degrees per step
      var smoothCount = 0;
      var sharpCount = 0;

      for (var i = 1; i < pts.length - 1; i++) {
        var a1 = Math.atan2(pts[i].y - pts[i - 1].y, pts[i].x - pts[i - 1].x);
        var a2 = Math.atan2(pts[i + 1].y - pts[i].y, pts[i + 1].x - pts[i].x);
        var diff = a2 - a1;
        // Normalize to [-PI, PI]
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        if (Math.abs(diff) > sharpThreshold) {
          sharpCount++;
        } else {
          smoothCount++;
        }
      }
      var total = smoothCount + sharpCount;
      return {
        smoothRatio: total > 0 ? smoothCount / total : 0.5,
        sharpCount: sharpCount
      };
    }

    // ══════════════════════════════════════════════════════
    // SIGNAL 3: Isoperimetric quotient (compactness)
    // ══════════════════════════════════════════════════════
    // IQ = 4 * PI * area / perimeter^2
    //
    // Theoretical values for perfect shapes:
    //   Circle:              1.000
    //   Square:              0.785  (PI/4)
    //   Rectangle (2:1):     0.698
    //   Equilateral triangle: 0.604
    //
    // Hand-drawn shapes are noisier, but the ranking holds:
    //   Drawn circle:    0.70 - 0.95
    //   Drawn rectangle: 0.55 - 0.80
    //   Drawn triangle:  0.35 - 0.65

    function measureCompactness() {
      var raw = flattenStrokes();
      if (raw.length < 10) return { iq: 0 };

      var pts = resamplePoints(raw, 200);
      var perimeter = polyPerimeter(pts);
      var area = polygonArea(pts);
      var iq = perimeter > 0 ? (4 * Math.PI * area) / (perimeter * perimeter) : 0;
      return { iq: iq };
    }

    // ══════════════════════════════════════════════════════
    // SIGNAL 4: Bounding box fill ratio
    // ══════════════════════════════════════════════════════
    // Uses the flood-fill pixel data from findEnclosedRegion().
    // pixelArea / boundingBoxArea tells us how much of the bbox
    // the shape occupies.
    //
    //   Circle:    ~0.785 (PI/4)
    //   Triangle:  ~0.50
    //   Rectangle: ~0.90 - 1.00
    //
    // This is the most reliable signal for triangle detection,
    // because triangles leave large empty corners in their bbox.

    function bboxFillRatio(region) {
      var b = region.bounds;
      var bboxW = b.maxX - b.minX;
      var bboxH = b.maxY - b.minY;
      var bboxArea = bboxW * bboxH;
      if (bboxArea < 1) return 0;
      var pixelArea = region.pixels.length / (region.scale * region.scale);
      return pixelArea / bboxArea;
    }

    // ══════════════════════════════════════════════════════
    // SIGNAL 5: Convex hull vertex count + hull fit
    // ══════════════════════════════════════════════════════
    // The convex hull of the drawn points, simplified, tells us
    // how many dominant vertices the shape has.
    //   Triangle:  3 vertices
    //   Rectangle: 4-5 vertices
    //   Circle:    8+ vertices (approximated by many short edges)
    //
    // Hull fit ratio = hullArea / bboxArea.
    //   Triangle:  ~0.50
    //   Rectangle: ~0.85-1.00
    //   Circle:    ~0.78

    function hullAnalysis(region) {
      var b = region.bounds;
      var bboxW = b.maxX - b.minX;
      var bboxH = b.maxY - b.minY;
      if (bboxW < 1 || bboxH < 1) return { vertices: 0, fitRatio: 0, aspect: 1 };

      var raw = flattenStrokes();
      var pts = resamplePoints(raw, 200);
      var hull = convexHull(pts.slice());

      // Simplify hull to find dominant vertices
      var hullPerimeter = 0;
      for (var i = 0; i < hull.length; i++) {
        var j = (i + 1) % hull.length;
        hullPerimeter += dist(hull[i], hull[j]);
      }
      // Close the hull for simplification, then remove duplicate endpoint
      var closed = hull.concat([hull[0]]);
      var hullSimplified = simplifyHull(closed, hullPerimeter * 0.04);
      if (hullSimplified.length > 1 &&
          dist(hullSimplified[0], hullSimplified[hullSimplified.length - 1]) < hullPerimeter * 0.02) {
        hullSimplified.pop();
      }

      var hullArea = polygonArea(hull);
      var fitRatio = (bboxW * bboxH) > 0 ? hullArea / (bboxW * bboxH) : 0;

      return {
        vertices: hullSimplified.length,
        fitRatio: fitRatio,
        aspect: bboxW / bboxH
      };
    }

    // ══════════════════════════════════════════════════════
    // BONUS: Multi-stroke structure analysis
    // ══════════════════════════════════════════════════════
    // If the user drew 3 separate strokes, they almost certainly
    // meant a triangle. 4 strokes = rectangle. 1 stroke = use
    // the geometry signals. This is a strong prior that overrides
    // ambiguous geometry.

    function strokeStructureHint() {
      var n = allStrokes.length;
      // Only trust stroke count if each stroke has enough points
      // (filters out accidental taps / micro-strokes)
      var substantialStrokes = 0;
      for (var s = 0; s < n; s++) {
        if (allStrokes[s].length >= 5) substantialStrokes++;
      }
      if (substantialStrokes === 3) return 'triangle';
      if (substantialStrokes === 4) return 'rectangle';
      return null; // no strong hint from stroke count
    }

    // ══════════════════════════════════════════════════════
    // MAIN CLASSIFIER: weighted vote across all signals
    // ══════════════════════════════════════════════════════

    function classifyShape(region) {
      var b = region.bounds;
      var bboxW = b.maxX - b.minX;
      var bboxH = b.maxY - b.minY;
      if (bboxW < 1 || bboxH < 1) {
        var m = SHAPES.rectangle;
        return { page: m.page, hint: m.hint, shape: 'rectangle', confidence: 0.5 };
      }
      var aspectRatio = bboxW / bboxH;

      // Gather all signals
      var corners   = detectCorners();
      var curve     = curvatureProfile();
      var compact   = measureCompactness();
      var bboxFill  = bboxFillRatio(region);
      var hull      = hullAnalysis(region);
      var strokeHint = strokeStructureHint();

      // ── Score accumulators ──
      var scores = { circle: 0, triangle: 0, rectangle: 0 };

      // ────────────────────────────────────────────────
      // Signal 1: Corner count  (weight: 4 — strongest)
      // ────────────────────────────────────────────────
      var c = corners.corners;
      if (c <= 1) {
        scores.circle += 4;
      } else if (c === 2) {
        scores.circle += 2.5;
        scores.triangle += 1;
      } else if (c === 3) {
        scores.triangle += 4;
      } else if (c >= 4 && c <= 5) {
        scores.rectangle += 4;
      } else { // 6+: very noisy, likely a wobbly circle
        scores.circle += 2.5;
        scores.rectangle += 1;
      }

      // ────────────────────────────────────────────────
      // Signal 2: Curvature smoothness  (weight: 3)
      // ────────────────────────────────────────────────
      var sr = curve.smoothRatio;
      if (sr > 0.80) {
        scores.circle += 3;
      } else if (sr > 0.65) {
        scores.circle += 2;
        scores.rectangle += 0.8;
      } else if (sr > 0.45) {
        scores.rectangle += 2;
        scores.triangle += 1.5;
      } else {
        scores.triangle += 2;
        scores.rectangle += 1.5;
      }

      // ────────────────────────────────────────────────
      // Signal 3: Compactness / IQ  (weight: 2)
      // ────────────────────────────────────────────────
      // Score each shape by proximity to its ideal IQ value.
      // Gaussian-ish falloff: score = weight * exp(-dist^2 / 2*sigma^2)
      // Using simpler linear falloff for speed.
      var iq = compact.iq;
      scores.circle    += 2 * Math.max(0, 1 - Math.abs(iq - 0.85) / 0.30);
      scores.triangle  += 2 * Math.max(0, 1 - Math.abs(iq - 0.52) / 0.25);
      scores.rectangle += 2 * Math.max(0, 1 - Math.abs(iq - 0.72) / 0.25);

      // ────────────────────────────────────────────────
      // Signal 4: Bounding box fill  (weight: 3)
      // ────────────────────────────────────────────────
      scores.circle    += 3 * Math.max(0, 1 - Math.abs(bboxFill - 0.785) / 0.25);
      scores.triangle  += 3 * Math.max(0, 1 - Math.abs(bboxFill - 0.50) / 0.20);
      scores.rectangle += 3 * Math.max(0, 1 - Math.abs(bboxFill - 0.95) / 0.20);

      // ────────────────────────────────────────────────
      // Signal 5: Hull vertices + fit  (weight: 2)
      // ────────────────────────────────────────────────
      var hv = hull.vertices;
      if (hv <= 3) {
        scores.triangle += 1.5;
      } else if (hv <= 5) {
        scores.rectangle += 1.5;
      } else if (hv <= 8) {
        scores.rectangle += 0.5;
        scores.circle += 0.8;
      } else {
        scores.circle += 1.5;
      }

      // Hull fit ratio sub-signal
      var hfr = hull.fitRatio;
      if (hfr < 0.60) {
        scores.triangle += 0.5;
      } else if (hfr > 0.82) {
        scores.rectangle += 0.5;
      } else {
        scores.circle += 0.5;
      }

      // ────────────────────────────────────────────────
      // Bonus: Multi-stroke prior  (weight: 3)
      // ────────────────────────────────────────────────
      // Drawing 3 separate lines is a very strong triangle signal.
      // Drawing 4 separate lines is a very strong rectangle signal.
      if (strokeHint === 'triangle') {
        scores.triangle += 3;
      } else if (strokeHint === 'rectangle') {
        scores.rectangle += 3;
      }

      // ── Pick the winner ──
      var best = 'rectangle';
      var bestScore = scores.rectangle;
      if (scores.circle > bestScore)   { best = 'circle';   bestScore = scores.circle; }
      if (scores.triangle > bestScore) { best = 'triangle'; bestScore = scores.triangle; }

      // ── Confidence: margin between winner and runner-up ──
      var sorted = [scores.circle, scores.triangle, scores.rectangle];
      sorted.sort(function(a, b) { return b - a; });
      var margin = sorted[0] - sorted[1];
      var maxPossible = 15; // theoretical max per shape
      var confidence = Math.min(0.99, 0.50 + (margin / maxPossible) * 1.5);

      // ── Square easter egg ──
      // Rectangle with near-equal sides = square
      if (best === 'rectangle') {
        var sideRatio = Math.min(aspectRatio, 1 / aspectRatio);
        if (sideRatio > 0.78) {
          best = 'square';
        }
      }

      // ── Rounded rectangle vs circle disambiguation ──
      // This is the trickiest edge case. A rounded rectangle has:
      //   - Compactness between rect and circle (0.80-0.92)
      //   - 3-5 detected corners (corners are soft but present)
      //   - Smooth ratio 0.65-0.80 (smoother than sharp rect, less than circle)
      //   - Bbox fill > 0.82 (higher than a circle's 0.785)
      //
      // If circle wins by a thin margin, check these tiebreakers:
      if (best === 'circle' && margin < 2.5) {
        var looksRoundedRect = (
          c >= 3 &&           // has detectable corners
          bboxFill > 0.82 &&  // fills bbox more than a circle would
          iq < 0.93           // not perfectly round
        );
        if (looksRoundedRect) {
          best = 'rectangle';
          confidence = Math.max(0.55, confidence - 0.10);
          // Check for square
          var sr2 = Math.min(aspectRatio, 1 / aspectRatio);
          if (sr2 > 0.78) best = 'square';
        }
      }

      var m = SHAPES[best] || SHAPES.rectangle;
      return { page: m.page, hint: m.hint, shape: best, confidence: confidence };
    }

    // Combined shape label — shows "you're a triangle · three people in every piece of gossip"
    function flashGeometricShape(region, classification) {
      // Don't flash for rectangle (the default)
      if (classification.shape === 'rectangle') return;
    }

    // Replaces both the flash AND the old showShapeHint with one combined label
    function showCombinedHint(region, classification) {
      var b = region.bounds;
      var cx = (b.minX + b.maxX) / 2;
      var bottomY = b.maxY + 25;
      if (bottomY > window.innerHeight - 60) bottomY = b.minY - 35;

      var label = document.createElement('div');
      if (classification.shape !== 'rectangle') {
        label.innerHTML = '<span style="color:#E91E7B;">' + classification.shape + '</span> · ' + classification.hint;
      } else {
        label.textContent = classification.hint;
      }
      label.style.cssText = 'position:fixed;z-index:9;pointer-events:none;font-family:Caveat,cursive;font-size:1.3rem;color:#999;text-align:center;opacity:0;transition:opacity 0.4s ease;left:' + cx + 'px;top:' + bottomY + 'px;transform:translateX(-50%);white-space:nowrap;';

      document.body.appendChild(label);
      setTimeout(function () { label.style.opacity = '1'; }, 50);
    }

    // Show the shape hint near the shape
    function showShapeHint(region, classification) {
      var b = region.bounds;
      var centerX = (b.minX + b.maxX) / 2;
      var bottomY = b.maxY + 30;

      // If too close to bottom of viewport, place above
      if (bottomY > window.innerHeight - 50) {
        bottomY = b.minY - 30;
      }

      var hint = document.createElement('div');
      hint.className = 'shape-hint';
      hint.textContent = classification.hint;
      hint.style.left = centerX + 'px';
      hint.style.top = bottomY + 'px';
      hint.style.transform = 'translateX(-50%) translateY(8px)';
      document.body.appendChild(hint);
    }

    function endDraw(e) {
      if (!drawing || shapeClosed) return;
      e.preventDefault();
      drawing = false;

      if (points.length < 5) {
        points = [];
        return;
      }

      allStrokes.push([...points]);
      points = [];

      // Check for any enclosed region
      var region = findEnclosedRegion();
      if (region) {
        shapeClosed = true;
        enclosedData = region;

        // Classify the shape
        var classification = classifyShape(region);
        lastClassification = classification;
        targetPage = classification.page;

        // Redraw with illustration in the enclosed region
        redrawAll();

        // Show combined shape label + hint
        showCombinedHint(region, classification);

        canvas.style.cursor = 'pointer';
        startPulse();
      }
    }

    // Pulse animation — redraws white background, strokes, then cuts out with subtle glow variation
    let pulseRAF = null;
    let pulseStart = null;

    function startPulse() {
      pulseStart = performance.now();
      pulseTick();
    }

    function pulseTick() {
      if (!shapeClosed || !enclosedData) return;
      var elapsed = performance.now() - pulseStart;
      var cycle = (Math.sin(elapsed / 1000 * Math.PI) + 1) / 2;

      // Redraw white background
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // Redraw all strokes
      for (var i = 0; i < allStrokes.length; i++) {
        drawStroke(allStrokes[i], false);
      }

      // Paint the illustration into the enclosed region
      paintIllustrationInRegion(enclosedData, 1);

      // Subtle pulsing pink overlay on top
      var glowAlpha = 0.02 + cycle * 0.06;
      ctx.save();
      ctx.fillStyle = 'rgba(233, 30, 123, ' + glowAlpha + ')';
      var step = 1 / enclosedData.scale;
      for (var y = 0; y < enclosedData.h; y++) {
        for (var x = 0; x < enclosedData.w; x++) {
          if (enclosedData.visited[y * enclosedData.w + x] === 0) {
            ctx.fillRect(x / enclosedData.scale, y / enclosedData.scale, step, step);
          }
        }
      }
      ctx.restore();

      pulseRAF = requestAnimationFrame(pulseTick);
    }

    function handleClick(e) {
      if (!shapeClosed || !enclosedData) return;
      var pos = getPos(e);
      // Check if click is inside the enclosed region
      var sx = Math.floor(pos.x * enclosedData.scale);
      var sy = Math.floor(pos.y * enclosedData.scale);
      if (sx >= 0 && sx < enclosedData.w && sy >= 0 && sy < enclosedData.h) {
        if (enclosedData.visited[sy * enclosedData.w + sx] === 0) {
          enterSite();
        }
      }
    }

    function enterSite() {
      sessionStorage.setItem('joyus_entered', '1');
      sessionStorage.removeItem('joyus_shape_replayed'); // ensure hero replay on first landing

      var normalizedPath = allStrokes.map(function(s) {
        return s.map(function(p) {
          return { x: p.x / window.innerWidth, y: p.y / window.innerHeight };
        });
      });

      // Store the drawn shape so it can be echoed in the nav on the landing page
      sessionStorage.setItem('joyus_shape', JSON.stringify({
        path: normalizedPath,
        hint: targetPage,
        shapeType: lastClassification ? lastClassification.shape : 'other'
      }));

      // Save shape to Firestore so other visitors can see it
      if (typeof firebase !== 'undefined' && firebase.firestore) {
        try {
          var db = firebase.firestore();
          // Only save first 3 strokes, simplified, to keep docs small
          var simplifiedPath = normalizedPath.slice(0, 3).map(function(s) {
            // Sample every Nth point to reduce size
            var step = Math.max(1, Math.floor(s.length / 30));
            var sampled = [];
            for (var i = 0; i < s.length; i += step) sampled.push(s[i]);
            return sampled;
          });
          db.collection('shapes').add({
            path: JSON.stringify(simplifiedPath),
            shapeType: lastClassification ? lastClassification.shape : 'other',
            confidence: lastClassification ? lastClassification.confidence : 0,
            page: targetPage,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
        } catch (e) { /* silent */ }
      }

      if (pulseRAF) cancelAnimationFrame(pulseRAF);
      wrapper.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = targetPage;
      }, 700);
    }

    // Event listeners
    // Mouse
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    // Touch
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw, { passive: false });
    canvas.addEventListener('touchcancel', endDraw, { passive: false });

    // Click to enter
    canvas.addEventListener('click', handleClick);
    canvas.addEventListener('touchend', function(e) {
      if (!shapeClosed || !enclosedData) return;
      setTimeout(function() {
        if (!shapeClosed) return;
        var touch = e.changedTouches && e.changedTouches[0];
        if (!touch) return;
        var pos = { x: touch.clientX, y: touch.clientY };
        var sx = Math.floor(pos.x * enclosedData.scale);
        var sy = Math.floor(pos.y * enclosedData.scale);
        if (sx >= 0 && sx < enclosedData.w && sy >= 0 && sy < enclosedData.h) {
          if (enclosedData.visited[sy * enclosedData.w + sx] === 0) {
            enterSite();
          }
        }
      }, 50);
    });

    // Prevent scrolling on touch
    document.body.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    // Resize
    window.addEventListener('resize', resize);
    resize();
  </script>
