<!-- Single source of truth for the top nav.
     Sync into pages by running:  node scripts/sync-chrome.js
     {{P}} → path prefix to repo root (e.g. "" or "../") -->
<style>
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 1.25rem clamp(1.5rem, 4vw, 3rem);
    padding-top: max(1.25rem, env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 500;
    background: rgba(250, 247, 242, 0.88);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
  }
  .nav .nav-logo { display: inline-flex; align-items: center; line-height: 1; position: relative; z-index: 510; }
  .nav .nav-logo img { height: 32px; width: auto; display: block; }
  .nav .nav-links {
    display: flex; gap: 1.75rem; align-items: center;
    list-style: none; padding: 0; margin: 0;
  }
  .nav .nav-links a {
    font-size: 0.92rem;
    color: #54606F;
    text-decoration: none;
    font-weight: 400;
    padding-bottom: 2px;
    border-bottom: 1.5px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .nav .nav-links a:hover { color: #E91E7B; }
  .nav .nav-links a.active {
    color: #2C3544;
    font-weight: 500;
    border-bottom-color: #E91E7B;
  }
  .nav .nav-cta { color: #2C3544; font-weight: 500; }
  .nav .nav-cta:hover { color: #E91E7B; }

  /* Hamburger button — hidden on desktop */
  .nav-toggle {
    display: none;
    width: 44px; height: 44px;
    background: transparent; border: 0; padding: 0;
    cursor: pointer; position: relative; z-index: 510;
    align-items: center; justify-content: center;
  }
  .nav-toggle span {
    display: block; width: 24px; height: 2px;
    background: #2C3544; border-radius: 2px;
    position: absolute;
    transition: transform 0.25s ease, top 0.25s ease, opacity 0.2s;
  }
  .nav-toggle span:nth-child(1) { top: 14px; }
  .nav-toggle span:nth-child(2) { top: 21px; }
  .nav-toggle span:nth-child(3) { top: 28px; }
  .nav-toggle[aria-expanded="true"] span:nth-child(1) { top: 21px; transform: rotate(45deg); }
  .nav-toggle[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
  .nav-toggle[aria-expanded="true"] span:nth-child(3) { top: 21px; transform: rotate(-45deg); }

  @media (max-width: 720px) {
    .nav {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      background: rgba(250, 247, 242, 0.95);
    }
    .nav-toggle { display: inline-flex; }
    .nav .nav-links {
      position: fixed;
      inset: 0;
      padding: 6rem clamp(1.5rem, 4vw, 3rem) 3rem;
      padding-top: max(6rem, calc(env(safe-area-inset-top) + 5rem));
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 1.75rem;
      background: #ffffff;
      border-left: 4px solid #2C3544;
      box-shadow: -16px 0 48px rgba(44, 53, 68, 0.22);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 505;
    }
    .nav .nav-links.open { transform: translateX(0); }
    .nav .nav-links a {
      font-size: 1.6rem;
      font-weight: 500;
      color: #2C3544;
    }
    .nav .nav-links a.active { border-bottom-color: #E91E7B; }
    .nav .nav-cta { font-size: 1.6rem; }
  }
</style>
<nav class="nav">
  <a class="nav-logo" href="{{P}}home.html"><img src="{{P}}images/logo.webp" alt="Joyus Studio" /></a>
  <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navMenu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="navMenu">
    <a href="{{P}}work/" data-nav="work">Work</a>
    <a href="{{P}}services.html" data-nav="services">Services</a>
    <a href="{{P}}podcast.html" data-nav="podcast">Podcast</a>
    <a class="nav-cta" href="mailto:hello@joyus.studio">Say hi</a>
  </div>
</nav>
<script>
  (function(){
    var path = window.location.pathname;
    var active = null;
    if (/\/work(\/|$)/.test(path)) active = 'work';
    else if (/services\.html/.test(path)) active = 'services';
    else if (/podcast/.test(path)) active = 'podcast';
    if (active) {
      var links = document.querySelectorAll('.nav .nav-links a[data-nav]');
      for (var i = 0; i < links.length; i++) {
        if (links[i].getAttribute('data-nav') === active) {
          links[i].classList.add('active');
        }
      }
    }
    // hamburger toggle
    var toggle = document.querySelector('.nav-toggle');
    var menu = document.querySelector('.nav .nav-links');
    if (toggle && menu) {
      var close = function() {
        menu.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      };
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = menu.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
        document.body.style.overflow = open ? 'hidden' : '';
      });
      // close on link tap
      menu.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', close);
      });
      // close on escape
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && menu.classList.contains('open')) close();
      });
    }
  })();
</script>
