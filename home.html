    /* Override global fade-in so sections are visible by default on homepage */
    .intent-hero, .featured-work, .podcast, .podcast-section {
      opacity: 1;
      transform: none;
    }

    /* ── Intent Hero ── */
    .intent-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 2rem;
    }
    .intent-content {
      text-align: center;
      max-width: 700px;
      width: 100%;
    }
    .intent-content h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 5vw, 3.2rem);
      color: #111;
      margin-bottom: 0.25rem;
      font-weight: 400;
    }
    .intent-input-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 520px;
      margin-top: 0.5rem;
    }
    #intentInput {
      width: 100%;
      border: none;
      border-bottom: 2px solid #E91E7B;
      outline: none;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      color: #111;
      padding: 0.5rem 0;
      background: transparent;
      text-align: center;
      caret-color: #E91E7B;
    }
    #intentInput::placeholder {
      color: #ccc;
      font-style: italic;
    }

    /* ── Suggestions dropdown ── */
    .intent-suggestions {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      margin-top: 0.5rem;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      z-index: 50;
      max-height: 320px;
      overflow-y: auto;
    }
    .intent-suggestions.visible {
      display: block;
    }
    .intent-suggestion {
      padding: 0.75rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: #444;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .intent-suggestion:hover,
    .intent-suggestion.active {
      background: #fdf0f5;
      color: #E91E7B;
    }
    .intent-suggestion .suggestion-dest {
      display: block;
      font-size: 0.75rem;
      color: #bbb;
      margin-top: 0.15rem;
      font-weight: 400;
    }
    .intent-suggestion:hover .suggestion-dest,
    .intent-suggestion.active .suggestion-dest {
      color: #e89ab8;
    }
    .intent-suggestion.past-intent {
      font-style: italic;
      color: #999;
      font-size: 0.92rem;
    }
    .intent-suggestion.past-intent:hover,
    .intent-suggestion.past-intent.active {
      color: #E91E7B;
    }
    .past-intent-prefix {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ccc;
      font-style: normal;
    }
    .enter-hint {
      color: #ccc;
      font-size: 0.85rem;
      font-style: italic;
      border-top: 1px solid #f0eeec;
      margin-top: 0.25rem;
      padding-top: 0.75rem;
    }
    .enter-hint:hover {
      color: #999;
      background: transparent;
    }

    /* ── Interstitial overlay ── */
    .intent-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.97);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .intent-overlay.visible {
      display: flex;
      opacity: 1;
    }
    .intent-overlay-inner {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .intent-overlay-inner .user-intent {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3vw, 2rem);
      color: #111;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }
    .intent-overlay-inner .overlay-ack {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: #888;
      margin-bottom: 2.5rem;
    }
    .intent-overlay-inner .follow-up-form {
      margin-bottom: 2rem;
    }
    .intent-overlay-inner .follow-up-form label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #999;
      display: block;
      margin-bottom: 0.5rem;
    }
    .intent-overlay-inner .follow-up-form input[type="email"] {
      border: none;
      border-bottom: 1.5px solid #ddd;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 0.5rem 0;
      width: 100%;
      max-width: 300px;
      text-align: center;
      caret-color: #E91E7B;
      background: transparent;
      color: #111;
    }

      border-bottom-color: #E91E7B;
    }
    .intent-overlay-inner .follow-up-form button {
      margin-top: 0.75rem;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: #E91E7B;
      cursor: pointer;
      font-weight: 600;
    }
    .intent-overlay-inner .follow-up-form button:hover {
      opacity: 0.7;
    }
    .intent-overlay-inner .continue-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      transition: color 0.2s;
    }
    .intent-overlay-inner .continue-link:hover {
      color: #E91E7B;
    }

    /* ── Featured work card image style ── */
    .featured-card-img {
      width: 100%;
      height: 200px;
      overflow: hidden;
      position: relative;
      background: #f0eeec;
    }
    .featured-card-img img {

      height: 100%;

    .podcast-section {

      padding: 5rem 2rem;
    }
    .podcast-section .podcast {

      align-items: center;
      max-width: 1100px;

      color: #111 !important;

      { display: "to talk to someone", terms: ["talk", "chat", "call", "consultation", "consult", "advice", "discuss", "connect", "reach out", "contact", "email", "hello"], url: "mailto:hello@joyus.studio", dest: "get in touch" },

      // Work portfolio
      { display: "to see examples of your work", terms: ["work", "example", "portfolio", "case stud", "projects", "clients", "past work", "show me"], url: "work/index.html", dest: "all work" },
      { display: "to build something new", terms: ["build", "create", "make", "new project", "start", "idea", "something new", "dream"], url: "services.html", dest: "our services" },
      { display: "to understand my audience", terms: ["audience", "customer", "user", "persona", "segment", "target", "market research", "understand"], url: "services.html", dest: "our services" },
    ];

    // ── Past intents from Firestore ──
    let pastIntents = [];

    function loadPastIntents() {
      db.collection('intents')
        .orderBy('timestamp', 'desc')
        .limit(50)
        .get()
        .then(function(snapshot) {
          pastIntents = [];
          var seen = {};
          snapshot.forEach(function(doc) {
            var text = doc.data().text;
            if (text && !seen[text.toLowerCase()]) {
              seen[text.toLowerCase()] = true;
              pastIntents.push(text);
            }
          });
        })
        .catch(function(err) {
          console.log('Firestore read skipped:', err.message);
        });
    }

    function saveIntentToFirestore(text, email) {
      var data = {
        text: text,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        email: email || null,
        page: window.location.pathname
      };
      db.collection('intents').add(data).catch(function(err) {
        console.log('Firestore write skipped:', err.message);
      });
    }

    // Load past intents on page load
    loadPastIntents();

    // ── Fuzzy matching engine ──
    function fuzzyMatch(query) {
      if (!query || query.length === 0) {
        // No query: show a curated default set
        var defaults = [
          CONTENT_MAP.find(function(e) { return e.display === "help with a pitch deck"; }),
          CONTENT_MAP.find(function(e) { return e.display === "a brand that feels like me"; }),
          CONTENT_MAP.find(function(e) { return e.display === "to redesign my website"; }),
          CONTENT_MAP.find(function(e) { return e.display === "to talk to someone"; }),
          CONTENT_MAP.find(function(e) { return e.display === "to see examples of your work"; }),
          CONTENT_MAP.find(function(e) { return e.display === "to understand pricing"; }),
        ].filter(Boolean);
        return { contentMatches: defaults, intentMatches: [] };
      }

      var q = query.toLowerCase();
      var words = q.split(/\s+/).filter(function(w) { return w.length > 1; });

      // Score each content map entry
      var scored = CONTENT_MAP.map(function(entry) {
        var score = 0;
        // Check if any search terms appear as substrings in the user input
        entry.terms.forEach(function(term) {
          if (q.indexOf(term) !== -1) {
            score += 3; // exact substring match in query
          } else {
            // Check if any user word appears in the term
            words.forEach(function(word) {
              if (term.indexOf(word) !== -1) score += 1;
            });
          }
        });
        // Also check if user input appears in display text
        if (entry.display.toLowerCase().indexOf(q) !== -1) {
          score += 2;
        } else {
          words.forEach(function(word) {
            if (entry.display.toLowerCase().indexOf(word) !== -1) score += 0.5;
          });
        }
        return { entry: entry, score: score };
      });

      scored.sort(function(a, b) { return b.score - a.score; });
      var contentMatches = scored
        .filter(function(s) { return s.score >= 2; })
        .slice(0, 5)
        .map(function(s) { return s.entry; });

      // Find matching past intents
      var intentMatches = pastIntents.filter(function(text) {
        var t = text.toLowerCase();
        return words.some(function(word) { return t.indexOf(word) !== -1; });
      }).slice(0, 3);

      return { contentMatches: contentMatches, intentMatches: intentMatches };
    }

    // ── DOM references ──
    // intentInput already declared above in rotating placeholder
    const suggestionsEl = document.getElementById('intentSuggestions');
    const overlay = document.getElementById('intentOverlay');
    const overlayIntent = document.getElementById('overlayIntent');
    const continueLink = document.getElementById('continueLink');
    const followUpEmail = document.getElementById('followUpEmail');
    const followUpSubmit = document.getElementById('followUpSubmit');

    let activeSuggestionIndex = -1;
    let currentSuggestionData = []; // track { text, url } for each rendered suggestion

    function renderSuggestions(filter) {
      var query = (filter || '').toLowerCase().trim();
      var results = fuzzyMatch(query);
      suggestionsEl.innerHTML = '';
      currentSuggestionData = [];

      // Render content matches
      results.contentMatches.forEach(function(entry) {
        var div = document.createElement('div');
        div.className = 'intent-suggestion';
        var textSpan = document.createTextNode(entry.display);
        div.appendChild(textSpan);
        var destSpan = document.createElement('span');
        destSpan.className = 'suggestion-dest';
        destSpan.textContent = '\u2192 ' + entry.dest;
        div.appendChild(destSpan);
        div.addEventListener('click', function() { selectIntent(entry.display, entry.url); });
        suggestionsEl.appendChild(div);
        currentSuggestionData.push({ text: entry.display, url: entry.url });
      });

      // Render past intent matches (up to 3, only if we have a query)
      if (query.length > 0 && results.intentMatches.length > 0) {
        results.intentMatches.forEach(function(text) {
          // Don't duplicate if already shown as content match
          var isDuplicate = results.contentMatches.some(function(e) {
            return e.display.toLowerCase() === text.toLowerCase();
          });
          if (isDuplicate) return;

          var div = document.createElement('div');
          div.className = 'intent-suggestion past-intent';
          var prefix = document.createElement('span');
          prefix.className = 'past-intent-prefix';
          prefix.textContent = 'others asked: ';
          div.appendChild(prefix);
          div.appendChild(document.createTextNode(text));
          div.addEventListener('click', function() { selectIntent(text, null); });
          suggestionsEl.appendChild(div);
          currentSuggestionData.push({ text: text, url: null });
        });
      }

      // Add "press enter" hint when they're typing
      if (query.length > 2) {
        var hint = document.createElement('div');
        hint.className = 'intent-suggestion enter-hint';
        hint.textContent = 'press enter to tell us exactly what you need';
        hint.addEventListener('click', function() {
          selectIntent(query, null);
        });
        suggestionsEl.appendChild(hint);
        currentSuggestionData.push({ text: query, url: null });
        suggestionsEl.classList.add('visible');
      } else if (currentSuggestionData.length > 0) {
        suggestionsEl.classList.add('visible');
      } else {
        suggestionsEl.classList.remove('visible');
      }
      activeSuggestionIndex = -1;
    }

    function routeForIntent(text) {
      // Try to find a matching content map entry
      var q = text.toLowerCase();
      var words = q.split(/\s+/).filter(function(w) { return w.length > 1; });
      var bestMatch = null;
      var bestScore = 0;

      CONTENT_MAP.forEach(function(entry) {
        var score = 0;
        entry.terms.forEach(function(term) {
          if (q.indexOf(term) !== -1) score += 3;
          else words.forEach(function(word) {
            if (term.indexOf(word) !== -1) score += 1;
          });
        });
        if (score > bestScore) {
          bestScore = score;
          bestMatch = entry;
        }
      });

      if (bestMatch && bestScore > 0) return bestMatch.url;
      return 'services.html';
    }

    function selectIntent(text, url) {
      intentInput.value = text;
      suggestionsEl.classList.remove('visible');
      showOverlay(text, url);
    }

    function showOverlay(text, url) {
      var display = 'I need ' + text;
      overlayIntent.textContent = display;
      var targetUrl = url || routeForIntent(text);
      continueLink.href = targetUrl;
      overlay.style.display = 'flex';
      requestAnimationFrame(function() {
        overlay.classList.add('visible');
      });

      // Save intent to Firestore
      saveIntentToFirestore(text, null);
    }

    intentInput.addEventListener('input', function() {
      renderSuggestions(intentInput.value);
    });

    intentInput.addEventListener('focus', function() {
      renderSuggestions(intentInput.value);
    });

    intentInput.addEventListener('keydown', function(e) {
      var items = suggestionsEl.querySelectorAll('.intent-suggestion');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, items.length - 1);
        updateActiveSuggestion(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
        updateActiveSuggestion(items);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeSuggestionIndex >= 0 && currentSuggestionData[activeSuggestionIndex]) {
          var data = currentSuggestionData[activeSuggestionIndex];
          selectIntent(data.text, data.url);
        } else if (intentInput.value.trim().length > 0) {
          selectIntent(intentInput.value.trim(), null);
        }
      }
    });

    function updateActiveSuggestion(items) {
      items.forEach(function(el, i) {
        el.classList.toggle('active', i === activeSuggestionIndex);
      });
    }

    // Close suggestions when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.intent-input-wrap')) {
        suggestionsEl.classList.remove('visible');
      }
    });

    // Follow-up email submit
    followUpSubmit.addEventListener('click', function() {
      var email = followUpEmail.value.trim();
      if (email) {
        saveIntentToFirestore(intentInput.value.trim(), email);
        followUpSubmit.textContent = 'sent!';
        followUpSubmit.disabled = true;
      }
    });

    // Close overlay on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('visible')) {
        overlay.classList.remove('visible');
        setTimeout(function() { overlay.style.display = 'none'; }, 400);
      }
    });
  </script>
</body>
</html>
